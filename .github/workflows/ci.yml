name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['feature/*']

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter api run lint && pnpm --filter frontend run lint
        continue-on-error: true

      - name: Test
        run: pnpm --filter api run test && pnpm --filter frontend run test
        continue-on-error: true

      - name: Build API
        run: pnpm --filter api run build

      - name: Build Frontend
        run: pnpm --filter frontend run build

      - name: Security Audit
        run: pnpm audit --audit-level=critical
        continue-on-error: true
