version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventrix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: inventrix-api:local
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventrix
      REDIS_URL: redis://redis:6379
      PORT: '3001'
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:8080
      JWT_SECRET: local-dev-secret
      JWT_REFRESH_SECRET: local-dev-refresh-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: inventrix-frontend:local
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  pgdata:
